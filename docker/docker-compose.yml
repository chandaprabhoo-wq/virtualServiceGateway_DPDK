version: '3.9'

services:
  vsg-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: vsg-gateway
    privileged: true
    network_mode: host
    
    environment:
      VSG_CONFIG: /etc/vsg/vsg.conf
      VSG_WORKER_THREADS: 4
      VSG_MAX_SUBSCRIBERS: 1000000
      VSG_HUGEPAGES: /dev/hugepages
    
    volumes:
      - /dev/hugepages:/dev/hugepages
      - /sys/kernel/debug:/sys/kernel/debug
      - ./config:/etc/vsg:ro
      - ./logs:/var/log/vsg
    
    ports:
      - "9090:9090"   # Health check
      - "8080:8080"   # Prometheus metrics
    
    ulimits:
      memlock: -1
      nofile:
        soft: 65536
        hard: 65536
    
    cap_add:
      - NET_ADMIN
      - SYS_NICE
      - SYS_PTRACE
    
    sysctls:
      - net.core.rmem_max=134217728
      - net.core.wmem_max=134217728
      - net.core.netdev_max_backlog=5000
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

volumes:
  logs:
    driver: local
