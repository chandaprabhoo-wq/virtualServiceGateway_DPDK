# vSG Gateway Configuration
# This file contains runtime configuration for the vSG data plane

# ==================== DPDK Configuration ====================
[dpdk]
# EAL options passed to rte_eal_init
eal_options = --no-pci --no-huge

# Number of worker threads
worker_threads = 4

# NUMA awareness
numa_aware = true

# ==================== Port Configuration ====================
[ports]
# Port 0 configuration
port0.enabled = true
port0.rx_queues = 4
port0.tx_queues = 4
port0.mtu = 1500
port0.jumbo_enabled = false

# Port 1 configuration
port1.enabled = true
port1.rx_queues = 4
port1.tx_queues = 4
port1.mtu = 1500
port1.jumbo_enabled = false

# ==================== Metering (UBB) ====================
[metering]
# Maximum concurrent subscribers being tracked
max_subscribers = 1000000

# Rollup period (seconds)
rollup_period_sec = 300

# Export rollups to file
rollup_export_enabled = true
rollup_export_path = /tmp/vsg_rollups.json

# Threshold alerts (bytes)
threshold_1gb = 1073741824
threshold_10gb = 10737418240

# ==================== QoE Analytics ====================
[analytics]
# Maximum flows to track
max_flows = 100000

# Flow idle timeout (seconds) before cleanup
flow_idle_timeout_sec = 600

# Telemetry sample export
telemetry_export_enabled = true
telemetry_export_path = /tmp/vsg_telemetry.json
telemetry_max_samples = 10000

# Window for aggregation (seconds)
aggregation_window_sec = 60

# ==================== DPI Configuration ====================
[dpi]
# Enable DPI classification
enabled = true

# Signature file path
signature_file = /etc/vsg/dpi_signatures.conf

# Classification timeout per packet (microseconds)
timeout_us = 100

# Sampling rate (1 = all, 10 = 1 in 10)
sample_rate = 1

# Enable degraded mode on timeout
degradation_enabled = true

# ==================== Logging ====================
[logging]
# Log level: DEBUG, INFO, WARN, ERROR
level = INFO

# Log output file
file = /var/log/vsg/gateway.log

# Max log file size (MB)
max_size_mb = 100

# Number of rotated files to keep
max_files = 10

# ==================== Statistics & Monitoring ====================
[monitoring]
# Stats collection interval (milliseconds)
stats_interval_ms = 1000

# Enable prometheus metrics export
prometheus_enabled = false
prometheus_port = 8080

# Health check port
health_check_port = 9090

# ==================== Performance Tuning ====================
[performance]
# Packet batch size
batch_size = 32

# Mempool size per core
mempool_size = 65536

# Memory pool cache size
mempool_cache_size = 256

# Ring queue sizes for inter-core communication
ring_queue_size = 4096

# ==================== Container/Environment ====================
[runtime]
# Resource limits
max_cpu_cores = 8
max_memory_mb = 4096

# Graceful shutdown timeout (seconds)
shutdown_timeout_sec = 30

# Enable core dumps on crash
core_dumps_enabled = false
